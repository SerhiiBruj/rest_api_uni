version: '3.9'

services:

  mongo:
    image: mongo:7
    container_name: mongo_db

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: