version: "3.9"

services:

  db:
    image: postgres:16

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_DB: library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: fastapi_app

    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: